services:
  db:
    image: mysql:oraclelinux9
    container_name: mybad_db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=dev-db
      - MYSQL_USER=devuser
      - MYSQL_PASSWORD=devpassword
    networks:
      - sae

networks:
  sae:
    driver: bridge
