services:
  app:
    container_name: mybad-app
    image: docker-registry.quentin-uguen.fr/mybad:latest
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      APP_NAME: MyBAD
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: false
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-mybad}
      DB_USERNAME: ${DB_USERNAME:-mybad}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    volumes:
      - storage:/var/www/html/storage/app
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shared
      - internal

  mysql:
    container_name: mybad-sql
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mybad}
      MYSQL_USER: ${DB_USERNAME:-mybad}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  mysql_data:
  storage:

networks:
  shared:
    external: true
  internal:
    driver: bridge
